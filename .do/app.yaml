name: patchguard-erp
region: syd

ingress:
  rules:
    - component:
        name: backend
      match:
        path:
          prefix: /api
    - component:
        name: agent
      match:
        path:
          prefix: /jobs
    - component:
        name: agent
      match:
        path:
          prefix: /worker

services:
  - name: backend
    source_dir: /
    dockerfile_path: apps/backend-local/Dockerfile
    github:
      repo: llravelo/patchguard-erp
      branch: main
      deploy_on_push: true
    instance_size_slug: basic-xs   # 1 GB RAM, 1 vCPU — minimum for YOLOv5 CPU inference
    instance_count: 1
    http_port: 8000
    health_check:
      http_path: /healthz
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: WORKER_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: ALLOWED_ORIGINS
        scope: RUN_TIME
        type: SECRET          # set to your Netlify URL, e.g. https://patchguard.netlify.app
      - key: CONF_THRESHOLD
        scope: RUN_TIME
        value: "0.5"
      - key: IOU_THRESHOLD
        scope: RUN_TIME
        value: "0.45"
      - key: INFER_DEVICE
        scope: RUN_TIME
        value: cpu
      - key: REPORT_MODE
        scope: RUN_TIME
        value: mock             # change to "claude" and set ANTHROPIC_API_KEY to enable AI reports
      - key: ACTION_MATCH_RADIUS_M
        scope: RUN_TIME
        value: "30"
      - key: VISION_ENABLED
        scope: RUN_TIME
        value: "false"          # set to "true" and add GEMINI_API_KEY to enable vision captions
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET

  - name: agent
    source_dir: apps/agent
    dockerfile_path: Dockerfile.agent
    github:
      repo: llravelo/patchguard-erp
      branch: main
      deploy_on_push: true
    instance_size_slug: basic-xxs  # 512 MB RAM — sufficient for the control plane
    instance_count: 1
    http_port: 8765
    health_check:
      http_path: /healthz
    envs:
      - key: WORKER_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: PATCHGUARD_API_BASE
        scope: RUN_TIME
        type: SECRET            # set to the app public URL, e.g. https://patchguard-erp-xxxxx.ondigitalocean.app
      - key: CAPTURE_SOURCE
        scope: RUN_TIME
        value: satellite        # avoids Puppeteer/Chrome; switch to "streetview" + add GOOGLE_MAPS_API_KEY if needed
      - key: GOOGLE_MAPS_API_KEY
        scope: RUN_TIME
        type: SECRET

workers:
  # Capture worker — handles autonomous Street View / satellite inspection.
  # Comment out this block if you don't need the autonomous inspection feature.
  - name: worker
    source_dir: apps/agent
    dockerfile_path: Dockerfile.worker
    github:
      repo: llravelo/patchguard-erp
      branch: main
      deploy_on_push: true
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: AGENT_BASE
        scope: RUN_TIME
        type: SECRET            # set to the app public URL, e.g. https://patchguard-erp-xxxxx.ondigitalocean.app
      - key: WORKER_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: CAPTURE_SOURCE
        scope: RUN_TIME
        value: satellite
      - key: WORKER_HEADLESS
        scope: RUN_TIME
        value: "true"

databases:
  - name: patchguard-db
    engine: PG
    version: "16"
    size: db-s-1vcpu-1gb        # ~$15/mo — run `CREATE EXTENSION postgis;` after first provision
    num_nodes: 1
    production: false           # set to true for a standby replica in production
